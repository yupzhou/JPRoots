<script>
    // 文献数据将从JSON文件加载
    let documents = [];
    let allTags = [];
    
    // 当前状态
    let state = {
        searchQuery: "",
        selectedTags: [],
        isRegexMode: false,
        filteredDocuments: [],
        selectedDocument: null,
        currentPage: 1,
        totalPages: 1,
    };

    // DOM元素
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const regexToggle = document.getElementById('regexToggle');
    const tagFilterBtn = document.getElementById('tagFilterBtn');
    const tagDropdown = document.getElementById('tagDropdown');
    const clearBtn = document.getElementById('clearBtn');
    const selectedTagsContainer = document.getElementById('selectedTagsContainer');
    const resultCount = document.getElementById('resultCount');
    const documentList = document.getElementById('documentList');
    const metadataContent = document.getElementById('metadataContent');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const currentPageSpan = document.getElementById('currentPage');
    const totalPagesSpan = document.getElementById('totalPages');
    const tabs = document.querySelectorAll('.tab');

    // 从JSON文件加载文献数据
    async function loadDocuments() {
        try {
            const response = await fetch('documents.json');
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            documents = await response.json();
            
            // 提取所有标签
            allTags = Array.from(new Set(documents.flatMap(doc => doc.tags))).sort();
            
            // 初始化状态
            state.filteredDocuments = [...documents];
            
            // 初始化标签下拉菜单
            initTagDropdown();
            
            // 渲染文献列表
            renderDocumentList();
            
            return true;
        } catch (error) {
            console.error('加载文献数据失败:', error);
            documentList.innerHTML = '<li class="document-item"><div class="document-title">无法加载文献数据</div></li>';
            resultCount.textContent = '加载失败';
            return false;
        }
    }

    // 初始化标签下拉菜单
    function initTagDropdown() {
        tagDropdown.innerHTML = '';
        
        allTags.forEach(tag => {
            const tagOption = document.createElement('div');
            tagOption.className = 'tag-option';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `tag-${tag}`;
            checkbox.value = tag;
            checkbox.checked = state.selectedTags.includes(tag);
            checkbox.addEventListener('change', handleTagChange);
            
            const label = document.createElement('label');
            label.htmlFor = `tag-${tag}`;
            label.textContent = tag;
            
            tagOption.appendChild(checkbox);
            tagOption.appendChild(label);
            tagDropdown.appendChild(tagOption);
        });
        
        updateSelectedTagsDisplay();
    }

    // 处理标签选择变化
    function handleTagChange() {
        const selectedCheckboxes = tagDropdown.querySelectorAll('input[type="checkbox"]:checked');
        state.selectedTags = Array.from(selectedCheckboxes).map(cb => cb.value);
        updateSelectedTagsDisplay();
        filterDocuments();
    }

    // 更新已选标签显示
    function updateSelectedTagsDisplay() {
        selectedTagsContainer.innerHTML = '';
        
        if (state.selectedTags.length === 0) {
            return;
        }
        
        state.selectedTags.forEach(tag => {
            const tagElement = document.createElement('span');
            tagElement.className = 'selected-tag';
            tagElement.innerHTML = `
                ${tag}
                <span class="remove-tag" data-tag="${tag}">×</span>
            `;
            selectedTagsContainer.appendChild(tagElement);
        });
        
        // 添加移除标签的事件监听
        selectedTagsContainer.querySelectorAll('.remove-tag').forEach(removeBtn => {
            removeBtn.addEventListener('click', function() {
                const tagToRemove = this.getAttribute('data-tag');
                const checkbox = document.getElementById(`tag-${tagToRemove}`);
                if (checkbox) {
                    checkbox.checked = false;
                    handleTagChange();
                }
            });
        });
    }

    // 过滤文献 - 修复版（同时搜索标题、作者、年份）
function filterDocuments() {
    let filtered = [...documents];
    
    // 应用搜索过滤
    if (state.searchQuery.trim()) {
        if (state.isRegexMode) {
            try {
                const regex = new RegExp(state.searchQuery, 'i');
                filtered = filtered.filter(doc => 
                    regex.test(doc.title) || 
                    regex.test(doc.meta.authors.join(', ')) || 
                    regex.test(doc.meta.year.toString())
                );
            } catch (e) {
                // 正则表达式无效，不进行过滤
                console.error("无效的正则表达式:", e);
                // 显示错误信息
                resultCount.textContent = "正则表达式无效";
                return;
            }
        } else {
            const query = state.searchQuery.toLowerCase();
            filtered = filtered.filter(doc => {
                // 1. 搜索标题
                if (doc.title.toLowerCase().includes(query)) {
                    return true;
                }
                
                // 2. 搜索作者（每个作者单独检查）
                for (let author of doc.meta.authors) {
                    if (author.toLowerCase().includes(query)) {
                        return true;
                    }
                }
                
                // 3. 搜索年份
                if (doc.meta.year.toString().includes(state.searchQuery)) {
                    return true;
                }
                
                return false;
            });
        }
    }
    
    // 应用标签过滤
    if (state.selectedTags.length > 0) {
        filtered = filtered.filter(doc => 
            state.selectedTags.some(tag => doc.tags.includes(tag))
        );
    }
    
    state.filteredDocuments = filtered;
    renderDocumentList();
}

    // 渲染文献列表
    function renderDocumentList() {
        documentList.innerHTML = '';
        
        if (state.filteredDocuments.length === 0) {
            const noResults = document.createElement('li');
            noResults.className = 'document-item';
            noResults.innerHTML = '<div class="document-title">没有找到匹配的文献</div>';
            documentList.appendChild(noResults);
            resultCount.textContent = '0 篇文献';
            return;
        }
        
        state.filteredDocuments.forEach(doc => {
            const item = document.createElement('li');
            item.className = 'document-item';
            if (state.selectedDocument && state.selectedDocument.id === doc.id) {
                item.classList.add('active');
            }
            
            item.innerHTML = `
                <div class="document-title">${doc.title}</div>
                <div class="document-meta">${doc.meta.authors.join(', ')} · ${doc.meta.year}</div>
                <div class="document-tags">
                    ${doc.tags.map(tag => `<span class="document-tag">${tag}</span>`).join('')}
                </div>
            `;
            
            item.addEventListener('click', () => selectDocument(doc));
            documentList.appendChild(item);
        });
        
        resultCount.textContent = `${state.filteredDocuments.length} 篇文献`;
    }

    // 选择文献
    function selectDocument(doc) {
        state.selectedDocument = doc;
        state.currentPage = 1;
        
        // 更新列表选中状态
        document.querySelectorAll('.document-item').forEach(item => {
            item.classList.remove('active');
        });
        event.currentTarget.classList.add('active');
        
        // 显示元数据
        renderMetadata();
    
        
        // 切换到元数据标签
        switchTab('metadata');
    }

    // 渲染文献元数据
    function renderMetadata() {
        if (!state.selectedDocument) {
            metadataContent.innerHTML = '<div class="empty-state">请从左侧列表中选择一篇文献</div>';
            return;
        }
        
        const doc = state.selectedDocument;
        metadataContent.innerHTML = `
            <div class="metadata-content">
                <div class="metadata-group">
                    <h3>基本信息</h3>
                    <div class="metadata-item">
                        <div class="metadata-label">标题</div>
                        <div class="metadata-value">${doc.title}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">作者</div>
                        <div class="metadata-value">${doc.meta.authors.join(', ')}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">年份</div>
                        <div class="metadata-value">${doc.meta.year}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">标签</div>
                        <div class="metadata-value">
                            ${doc.tags.map(tag => `<span class="document-tag">${tag}</span>`).join(' ')}
                        </div>
                    </div>
                </div>
                
                <div class="metadata-group">
                    <h3>摘　　要</h3>
                    <div class="metadata-value abstract">${doc.meta.abstract}</div>
                </div>
                <div class="metadata-group">
                    <h3>阅　　读</h3>
                    <div class="metadata-value">${doc.meta.pdfUrl}</div>
                </div>
            </div>
        `;
    }

    

    // 切换标签页
    function switchTab(tabName) {
        // 更新标签栏
        tabs.forEach(tab => {
            if (tab.getAttribute('data-tab') === tabName) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
    
    }

    // 事件监听
    searchInput.addEventListener('input', function() {
        state.searchQuery = this.value;
        filterDocuments();
    });

    searchBtn.addEventListener('click', function() {
        filterDocuments();
    });

    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            filterDocuments();
        }
    });

    regexToggle.addEventListener('change', function() {
        state.isRegexMode = this.checked;
        filterDocuments();
    });

    // 标签筛选下拉菜单
    tagFilterBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        tagDropdown.classList.toggle('show');
    });

    // 点击外部关闭下拉菜单
    document.addEventListener('click', function() {
        tagDropdown.classList.remove('show');
    });

    // 阻止下拉菜单内部点击事件冒泡
    tagDropdown.addEventListener('click', function(e) {
        e.stopPropagation();
    });

    clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        state.searchQuery = '';
        state.selectedTags = [];
        
        // 取消所有选中的标签
        const checkboxes = tagDropdown.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = false);
        
        regexToggle.checked = false;
        state.isRegexMode = false;
        
        updateSelectedTagsDisplay();
        filterDocuments();
    });

    // 标签页切换
    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            const tabName = this.getAttribute('data-tab');
            switchTab(tabName);
        });
    });

    prevPageBtn.addEventListener('click', function() {
        if (state.currentPage > 1) {
            state.currentPage--;
            renderPage();
        }
    });

    nextPageBtn.addEventListener('click', function() {
        if (state.currentPage < state.totalPages) {
            state.currentPage++;
            renderPage();
        }
    });

    // 初始化应用
    async function initApp() {
        // 显示加载状态
        documentList.innerHTML = '<li class="document-item"><div class="document-title">正在加载文献数据...</div></li>';
        resultCount.textContent = '加载中...';
        
        // 加载文献数据
        const loaded = await loadDocuments();
        
        if (!loaded) {
            // 如果加载失败，显示错误信息
            documentList.innerHTML = '<li class="document-item"><div class="document-title">无法加载文献数据，请检查文档格式或网络连接</div></li>';
            resultCount.textContent = '加载失败';
        }
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initApp);
</script>
